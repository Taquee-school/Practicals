<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Permissions-Policy" content="unload=(self)">
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css"
    />
    <title>Practicals by Noor Taquee</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="practicals.css" />
  </head>
  <body>
    <div id="app" class="dark">
      <div id="inner-app">
        <div id="home-tab" class="inner-app-tab light">
          <div class="top-bar">
            <p class="practical-type-header">Physics Practicals</p>
            <button id="options-btn" class="ripple">
              <i class="ph-bold ph-dots-three-vertical"></i>
            </button>
          </div>

          <div class="added-panel" id="option-panel">
            <button id="theme-btn" class="option-panel-btn ripple">
              <i class="ph-fill ph-paint-roller"></i>
              <p>Theme</p>
            </button>
            <button id="navigation-bar-btn" class="option-panel-btn ripple">
              <i class="ph-fill ph-compass"></i>
              <p>Navigation bar</p>
            </button>
          </div>

          <div class="added-panel" id="theme-panel">
            <p class="added-panel-header">Choose Theme</p>
            <button id="light-btn-theme" class="option-panel-btn ripple">
              <i id="light-icon" class="ph-bold ph-circle"></i>
              <p>Light</p>
            </button>
            <button id="dark-btn-theme" class="option-panel-btn ripple">
              <i id="dark-icon" class="ph-fill ph-radio-button"></i>
              <p>Dark</p>
            </button>
            <div class="added-panel-btn-div">
              <button id="cancel-btn-theme">
                <p>cancel</p>
              </button>
              <button id="confirm-btn-theme">
                <p>ok</p>
              </button>
            </div>
          </div>

          <div class="added-panel" id="navigation-bar-panel">
            <p class="added-panel-header">Navigation bar style</p>
            <button id="floating-btn-navigation-bar" class="option-panel-btn ripple">
              <i id="floating-icon" class="ph-bold ph-circle"></i>
              <p>Floating</p>
            </button>
            <button id="sticky-btn-navigation-bar" class="option-panel-btn ripple">
              <i id="sticky-icon" class="ph-fill ph-radio-button"></i>
              <p>sticky</p>
            </button>
            <div class="added-panel-btn-div">
              <button id="cancel-btn-navigation-bar">
                <p>cancel</p>
              </button>
              <button id="confirm-btn-navigation-bar">
                <p>ok</p>
              </button>
            </div>
          </div>

          <div class="practicals-list-div">
            <p class="practicals-list-class-header">Class 11</p>
            <div class="practicals-list list-view" id="class-11"></div>
            <p class="practicals-list-class-header">Class 12</p>
            <div class="practicals-list list-view" id="class-12"></div>
          </div>
        </div>
        <div id="practical-tab" class="inner-app-tab light">
          <div id="practical-tab-header" class="tab-header">
            <div>
              <button class="back-btn ripple">
                <i class="ph-bold ph-arrow-left"></i>
              </button>
              <p id="experiment-name"></p>
            </div>
            <button id="help-button" class="back-btn ripple">
              <i class="ph-bold ph-question-mark"></i>
            </button>
          </div>
          <div id="practical-container" class="practical-tab-panel"></div>
        </div>
      </div>

      <div id="navigation-div" class="sticky">
        <button id="home-button" class="active">
          <div class="navigation-icon-container">
            <div class="navigation-icon-div active" id="home-icon"></div>
            <i class="ph-bold ph-list-bullets"></i>
          </div>
          <p>Home</p>
        </button>
        <button id="practical-button">
          <div class="navigation-icon-container">
            <div class="navigation-icon-div" id="practical-icon"></div>
            <i class="ph-fill ph-file-text"></i>
          </div>
          <p>Practical</p>
        </button>
      </div>
    </div>
    <div id="loading-screen">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <script>
function reloadPage() {
  window.location.reload()
}
    </script>
    <script src="UIhelperFunctions.js" onerror="reloadPage()"></script>
    <script src="script.js" onerror="reloadPage()"></script>
    <script defer src="practicals.js" onerror="reloadPage()"></script>
  </body>
</html>
