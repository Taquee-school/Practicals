<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="sCuHQ2Lt1OuPoKxz0M01KXE0nZlSZvXyjHgl6tro-54" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css" />
  <link rel="icon" href="Icons/favicon.ico">
  <title>Practicals by Noor Taquee</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="homeTab.css" />
  <link rel="stylesheet" href="settingsTab.css" />
</head>

<body>
  <div id="app" class="dark default vertical">
    <div id="inner-app">
      <div id="inner-app-tab-container">
        <div id="home-tab" class="inner-app-tab">
          <div id="home-content">
            <div class="top-bar">
              <p class="tab-header">Practicals</p>
            </div>
            <div class="content">
            </div>
          </div>
        </div>
        <div id="practical-tab" class="inner-app-tab light">
          <div id="practical-tab-header">
            <div>
              <button class="back-btn ripple">
                <i class="ph-bold ph-arrow-left"></i>
              </button>
              <p id="experiment-name"></p>
            </div>
            <button id="help-button" class="back-btn ripple">
              <i class="ph-bold ph-question-mark"></i>
            </button>
          </div>
          <div id="practical-tab-content">
            <div id="practical-container" class="practical-tab-panel"></div>
          </div>
        </div>
        <div id="settings-tab" class="inner-app-tab">
          <div id="settings-content">
            <img class="app-icon" src="Icons/android-chrome-192x192.png" alt="Settings">
            <p class="tab-header">Settings</p>
            <div class="settings-tab-section">
              <button id="theme-btn" class="tab-btn ripple">
                <i class="ph-bold ph-paint-roller"></i>
                <p>Theme</p>
              </button>
              <button id="palette-btn" class="tab-btn ripple">
                <i class="ph-bold ph-palette"></i>
                <p>Palette</p>
              </button>
              <button id="navigation-bar-btn" class="tab-btn ripple">
                <i class="ph-bold ph-compass"></i>
                <p>Navigation bar</p>
              </button>
              <button id="accessibility-btn" class="tab-btn ripple">
                <i class="ph-bold ph-eye"></i>
                <p>Accessibilty</p>
              </button>
            </div>
            <div class="settings-tab-section">
              <button id="error-btn" class="tab-btn ripple">
                <i class="ph-bold ph-bug"></i>
                <p>Report Error</p>
              </button>
              <button id="about-btn" class="tab-btn ripple">
                <i class="ph-bold ph-info"></i>
                <p>About</p>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div id="navigation-div" class="sticky">
        <button id="home-button" class="active">
          <div class="navigation-icon-container">
            <div class="navigation-icon-div active" id="home-icon"></div>
            <i class="ph-bold ph-list-bullets"></i>
          </div>
          <p>Home</p>
        </button>
        <button id="practical-button">
          <div class="navigation-icon-container">
            <div class="navigation-icon-div" id="practical-icon"></div>
            <i class="ph-fill ph-file-text"></i>
          </div>
          <p>Practical</p>
        </button>
        <button id="settings-button">
          <div class="navigation-icon-container">
            <div class="navigation-icon-div" id="settings-icon"></div>
            <i class="ph-bold ph-dots-three"></i>
          </div>
          <p>More</p>
        </button>
      </div>
    </div>
  </div>
  <script>
    let app = document.getElementById("app");

    let loadingScreen = document.getElementById("loading-screen");

    let innerApp = document.getElementById("inner-app");
    let innerAppTabContainer = document.getElementById("inner-app-tab-container");

    let homeTab = document.getElementById("home-tab");
    let homeContent = document.getElementById("home-content");
    let homeTabContent = document.querySelector("#home-tab .content");

    let practicalTab = document.getElementById("practical-tab");

    let settingsTab = document.getElementById("settings-tab");
    let settingsContent = document.getElementById("settings-content");

    let bnHome = document.getElementById("home-button");
    let homeIcon = document.getElementById("home-icon");

    let bnPractical = document.getElementById("practical-button");
    let practicalIcon = document.getElementById("practical-icon");

    let bnSettings = document.getElementById("settings-button");
    let settingsIcon = document.getElementById("settings-icon");

    let practicalContainer = document.getElementById("practical-container");
    let experimentName = document.getElementById("experiment-name");

    let NavigationDiv = document.getElementById("navigation-div");

  </script>
  <script src="script.js"></script>
  <script src="homeTab.js"></script>
  <script src="settingsTab.js"></script>
</body>

</html>
